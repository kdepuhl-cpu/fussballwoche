[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  GIT_SUBMODULE_FETCH_DEPTH = "0"

# Production (main branch)
[context.production.environment]
  NEXT_PUBLIC_ENV = "production"

# Staging (develop branch)
[context.develop.environment]
  NEXT_PUBLIC_ENV = "staging"

# Deploy Previews (Pull Requests)
[context.deploy-preview.environment]
  NEXT_PUBLIC_ENV = "preview"

# Pretty URLs (serve .html files without extension)
[build.processing]
  [build.processing.html]
    pretty_urls = true

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cloud.umami.is; frame-ancestors 'none'"
